<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="./CSS/checkout.css">
</head>
<body class="fondo">
    <header class="header">
        <div class="head__div">
            <div class="head">
            <a class="header__image" href="./index.html"><img class="header__image" src="./IMG/regresar.png" alt=""></a>
        </div>
        <div class="text">
             <p class="header__text">Mi carrito (3)</p>
        </div>
        </div>
      
    </header>
    <main class="headers">
        <div class="header__div">
            <h1 class="header__tittle">Envío</h1>
                <section class="document">
                    <label for="name">Nombre completo:</label>
                    <input type="name" class="name" id="name" required>
                    <label for="address">Dirección:</label>
                    <input type="address" class="addres" id="address" required>
                    <label for="city">Ciudad:</label>
                    <input type="city" class="city" class="city" required>
                </section>
        </div>
        <section class="seccion">
            <h3 class="metodo__tittle">Método de Pago</h3>
            <div class="seccion__div" >
                <img class="icono" src="./IMG/tarjeta.png" alt="Pago en tarjeta">
                <p class="letter">Tarjeta</p>
            </div>
            <div class="seccion__div" >
                <img class="icono" src="./IMG/contraentrega.png" alt="Pago contra entrega">
                <p class="letter">Contra entrega</p>
            </div>
            <div class="seccion__div" >
                <img class="icono" src="./IMG/transferencia.png" alt="Pago en transferencia">
                <p class="letter">Transferencia</p>
            </div>
        </section>
        </div>
        <section class="seccion__resumen">
            <div class="resumen__div">
                <div class="section">
                    <h3 class="resume">Resumen</h3>
                    <div class="resumen">
                    
                    <img class="img" src="./IMG/abrigos3.png" alt="Abrigo rojo">
                    </div>
                <div class="resumen">
                    <p>Abrigo rojo</p>
                    <p>$10.00</p>
                </div>
                <div class="resumen"> <p>Cantidad: 1</p></div>
                <div class="resumen">
                    <p>Total:</p>
                    <p>$10.00</p>
                </div>
            </div>
            <div class="div__pagar">
                <p class="pagar">Pagar $10.00</p>
            </div>
        </section>
    </main>
</body>
</html>
