<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>
    <link rel="stylesheet" href="./CSS/carrito.css">
</head>
<body class="fondo">
    <header class="header">
        <div class="header__div">
            <a href="./index.html"><img class="header__image" src="./IMG/regresar.png" alt=""></a>
        </div>
        <div class="header__tittle">
            <p class="header__text">Mi carrito (3)</p>
        </div>
        <hr>
        <main class="main__car">
            <div class="main__div">
                <section class="section__car">
                    <div class="main__image">
                        <img class="image" src="./IMG/abrigos2.png" alt="Abrigo café">
                    </div>
                    <div class="main__description">
                        <p class="description">Abrigo Café</p>
                        <p class="name">BabyShop</p>
                        <p class="code">A450F</p>
                    </div>
                    <div  class="main__details">
                        <img class="basurero" src="./IMG/basurero.png" alt="Basurero">
                        <p class="price">$14.00</p>
                        <p class="subtotal">Subtotal</p>
                    </div>
                </section>
                <section class="section__car">

                <div class="main__image">
                    <img class="image" src="./IMG/traje1.png" alt="Abrigo café">
                </div>
                <div class="main__description">
                    <p class="description">Traje de rayas</p>
                    <p class="name">BabyShop</p>
                    <p class="code">A50A0F</p>
                </div>
                <div  class="main__details">
                    <img class="basurero" src="./IMG/basurero.png" alt="Basurero">
                    <p class="price">$10.00</p>
                    <p class="subtotal">Subtotal</p>
                </div>
                </section>
                <section class="section__car">
                <div class="main__image">
                    <img class="image" src="./IMG/shoes4.png" alt="Abrigo café">
                </div>
                    <div class="main__description">
                        <p class="description">Botas</p>
                        <p class="name">BabyShop</p>
                        <p class="code">A6978F</p>
                    </div>
                    <div  class="main__details">
                        <img class="basurero" src="./IMG/basurero.png" alt="Basurero">
                        <p class="price">$20.00</p>
                        <p class="subtotal">Subtotal</p>
                    </div>
                </section>
            </di>
            <div class="seccion__pagar">
                <section class="pagar">
                    <div class="pagar__div">
                        <div class="pagar__sutototal">
                            <p class="subtota">Subtotal:</p>
                            <p class="precio">$44.00</p>
                        </div><br>
                    <div class="pagar__impuestos">
                            <p class="Impuestos">Impuestos:</p>
                            <p class="pric">$10.00</p>
                    </div><br><hr>
                        <div class="pagar__total">
                            <p class="total">Total</p>
                            <p class="total__pago">$54.00</p>
                    </div>
                        <div class="pagar__seguir">
                            <a class="seguir" href="./checkout.html"> Proceder a Pagar</a>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </header>
</body>
</html>
