<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>
    <link rel="stylesheet" href="./CSS/carrito.css">
</head>
<body class="fondo">
    <header class="header">
        <div class="header__div">
            <a href="./index.html"><img class="header__image" src="./IMG/regresar.png" alt=""></a>
        </div>
        <div class="header__tittle">
            <p class="header__text">Mi carrito (3)</p>
        </div>
        <hr>
        <main class="main__car">
            <div class="main__div">
                <div class="main__image">
                    <img class="image" src="./IMG/abrigos2.png" alt="Abrigo café">
                </div>
                <div class="main__description">
                    <p class="description">Abrigo Café</p>
                    <p class="name">BabyShop</p>
                    <p class="code">A450F</p>
                </div>
                <div  class="main__details">
                    <img class="basurero" src="./IMG/basurero.png" alt="Basurero">
                    <p class="price">$14.00</p>
                    <p class="subtotal">Subtotal</p>
                </div>
            </div>
        </main>
    </header>
</body>
</html>
