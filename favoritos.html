<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos</title>
</head>
 <link rel="stylesheet" href="./CSS/favoritos.css">
</head>
<body class="fondo">
    <header class="heads">
        <nav class="heades">
            <div class="main__header">
                <div class="main__regresar">
                    <a class="main__back" href="./catalogo.html"><img class="imagen__back" src="./IMG/regresar.png" alt="Signo para regresar"></a>
                </div>
                <div class="header__detail">
                    <p class="header__subtitle">Productos favoritos</p>
                </div>
                <div class="main__carrito">
                    <a href="./carrito.html"><img class="imagen__car" src="./IMG/carrito_compra.png" alt="carrito de compra"></a>
                </div>
            </div>
            <hr>
        </nav>
    </header>
    <main class="prince">
        <div class="prince__product">
            <img class="image__producto" src="./IMG/abrigos1.png" alt="Abrigo naranja">
            <h3 class="name__producto">Abrigo naranja</h3>
            <h4 class="price__producto">Precio: $14.00</h4>
            <p class="descriptio__producto">Este abrigo esta hecho de nylon, está rellena con algodón, este estilo esta relaciona con disney y es perfecto para invierno.</p>
        </div>
        <div class="choose__size">
            <label class="choose" for="size">Tallas</label><br>
            <input class="choose" type="radio" name="size" value="5">5
            <input class="choose" type="radio" name="size" value="3">3
            <input class="choose" type="radio" name="size" value="1">1
        </div>
        <div class="agregar">  <a class="add__car" href="./carrito.html">Agregar al carrito</a></div>
    </main>
</body>
</html>
